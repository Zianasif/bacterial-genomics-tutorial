name: bacterial-genomics-tutorial
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  # Quality control tools
  - fastqc>=0.12.1
  - quast>=5.2.0
  # Assembly tools
  - spades>=3.15.5
  - samtools>=1.18
  - bwa>=0.7.17
  - minimap2>=2.26
  # Read trimming and filtering
  - sickle-trim>=1.200
  - trimmomatic>=0.39
  - sickle>=1.33
  - porechop>=0.2.4
  # Genome comparison and analysis
  - mummer>=4.0.1
  - mash>=2.3
  - ragtag>=2.1.0
  - roary>=3.13.0
  - drep>=3.4.3
  # Annotation tools
  - prokka>=1.14.6
  - abricate>=1.0.1
  - mlst>=2.23.0
  # Sequence analysis
  - mafft>=7.520
  # Perl dependencies
  - perl-padwalker
  - perl-db-file
  # Data retrieval
  - sra-tools>=3.0.5
  # Development and testing
  - pip
  - pip:
      # Scientific packages
      - numpy>=1.24.0
      - pandas>=2.0.0
      - matplotlib>=3.7.0
      - matplotlib-venn>=0.11.9
      - biopython>=1.81
      # Testing
      - pytest>=7.4.0
      - pytest-cov>=4.1.0
      # Code quality
      - black>=23.7.0
      - flake8>=6.0.0
      - pylint>=2.17.0
      - mypy>=1.4.0
      # Documentation
      - sphinx>=7.0.0
